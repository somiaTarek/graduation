<!-- scheduling/scheduling.html -->
<div class="min-h-screen bg-[#F0F5FB] font-sans">

  <app-doctor-navbar />

  <div class="max-w-6xl mx-auto px-6 py-8">

    <!-- Loading -->
    @if (isLoading()) {
      <div class="flex items-center justify-center h-64">
        <div class="flex flex-col items-center gap-3 text-gray-400">
          <svg class="w-8 h-8 animate-spin text-[#6B9FD4]" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10"
                    stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
          <p class="text-sm">Loading schedule...</p>
        </div>
      </div>
    }

    <!-- Error -->
    @if (error()) {
      <div class="flex items-center justify-center h-64">
        <div class="bg-red-50 border border-red-200 rounded-2xl px-8 py-6 text-center">
          <p class="text-red-500 font-semibold mb-2">Failed to load schedule</p>
          <p class="text-red-400 text-sm mb-4">{{ error() }}</p>
          <button (click)="loadData()"
                  class="bg-red-100 hover:bg-red-200 text-red-600 text-sm
                         font-semibold px-4 py-2 rounded-lg transition">
            Retry
          </button>
        </div>
      </div>
    }

    <!-- Content -->
    @if (!isLoading() && data()) {

      <!-- Greeting -->
      <div class="mb-6">
        <h1 class="text-2xl font-extrabold text-gray-800 leading-tight">
          {{ data()!.greeting }},
        </h1>
        <h1 class="text-2xl font-extrabold text-gray-800 leading-tight">
          Dr. {{ data()!.doctorName }}!
        </h1>
      </div>

      <div class="flex gap-6 items-start">

        <!-- Upcoming sidebar -->
        <div class="w-72 shrink-0 bg-[#EEF4FB] rounded-2xl p-4 shadow-sm flex flex-col min-h-[560px]">
          <app-upcoming
            [nextAppointment]="data()!.nextAppointment"
            [upcomingList]="data()!.upcomingList"
            (cancelAppointment)="onCancelAppointment($event)"
          />
        </div>

        <!-- Week calendar -->
        <div class="flex-1 min-w-0">
          <app-weekcalendar
            [events]="data()!.calendarEvents"
            [weekStart]="weekStart()"
            (weekChanged)="onWeekChange($event)"
          />
        </div>

      </div>
    }

  </div>
</div>
