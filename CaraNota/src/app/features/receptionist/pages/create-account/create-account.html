<!-- src/app/features/receptionist/pages/create-account/create-account.html -->
<div class="min-h-screen bg-gray-50 flex flex-col">

  <app-receptionist-navbar />

  <div class="flex-1 flex flex-col items-center justify-start pt-8 px-4">

    <!-- Back button -->
    <div class="w-full max-w-lg mb-4">
      <button (click)="goBack()"
              class="flex items-center gap-1.5 text-sm text-gray-500
                     hover:text-blue-700 transition-colors">
        <span class="material-icons text-base">arrow_back</span>
        Back to dashboard
      </button>
    </div>

    <!-- Card -->
    <div class="w-full max-w-lg bg-white rounded-3xl shadow-sm p-8">

      <!-- Success banner -->
      @if (successMessage()) {
        <div class="flex items-center gap-2 bg-green-50 border border-green-200
                    rounded-xl px-4 py-3 mb-5">
          <span class="material-icons text-green-600 text-base">check_circle</span>
          <span class="text-sm text-green-700 font-medium">{{ successMessage() }}</span>
        </div>
      }

      <!--
        Reuse the shared AccountForm.
        showRoleField=false → role is always locked to 'patient' internally.
        The form emits a RegisterRequest via (formSubmit).
      -->
      <app-account-form
        submitLabel="Create Patient Account"
        [isLoading]="isLoading()"
        [errorMessage]="errorMessage()"
        [showRoleField]="false"
        (formSubmit)="onFormSubmit($event)" />

    </div>
  </div>
</div>
