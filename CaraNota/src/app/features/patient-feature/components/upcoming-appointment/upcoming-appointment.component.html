<!-- src/app/features/patient/components/upcoming-appointment/upcoming-appointment.component.html -->
<div class="flex items-center justify-between bg-blue-50 rounded-2xl px-5 py-4
            border border-blue-100">

  <div class="flex items-center gap-3">
    <!-- Calendar icon -->
    <div class="w-9 h-9 rounded-full bg-blue-600 flex items-center justify-center shrink-0">
      <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </div>

    <div>
      <p class="text-sm font-semibold text-gray-900">{{ appointment.doctorName }}</p>
      <p class="text-xs text-gray-500">{{ formatDateTime(appointment.startTime) }}</p>
    </div>
  </div>

  <!-- Cancel button — calls PUT /api/Appointment/{id}/cancel -->
  <button (click)="cancel.emit(appointment.appointmentID)"
          class="flex items-center gap-1.5 text-xs font-semibold text-white
                 bg-red-500 hover:bg-red-600 px-3 py-1.5 rounded-lg transition-colors">
    <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2.5" stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
    cancel
  </button>

</div>
