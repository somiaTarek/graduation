<!-- src/app/features/patient/components/footer/footer.component.html -->
<footer class="bg-[#1a2e6b] text-white mt-auto">
  <div class="max-w-6xl mx-auto px-6 py-8">

    <!-- Top row: logo + copyright + socials -->
    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4 pb-6 border-b border-white/10">

      <!-- Logo -->
      <div class="flex items-center gap-2">
        <img src="images/carenota.png" alt="CareNota" class="h-8 w-auto brightness-0 invert"
             onerror="this.style.display='none'">
        <span class="font-bold text-lg">CareNota</span>
      </div>

      <!-- Copyright -->
      <p class="text-sm text-white/60">© {{ year }} CareNota. All rights reserved.</p>

      <!-- Social icons -->
      <div class="flex items-center gap-4">
        <!-- Facebook -->
        <a href="#" class="text-white/60 hover:text-white transition-colors">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
          </svg>
        </a>
        <!-- Twitter/X -->
        <a href="#" class="text-white/60 hover:text-white transition-colors">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
            <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/>
          </svg>
        </a>
        <!-- LinkedIn -->
        <a href="#" class="text-white/60 hover:text-white transition-colors">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
            <rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>
          </svg>
        </a>
      </div>
    </div>

    <!-- Address block -->
    <div class="py-4 border-b border-white/10 text-sm text-white/70 space-y-1">
      <p><span class="text-white/40 w-16 inline-block">Address :</span> [Clinic Address Here]</p>
      <p><span class="text-white/40 w-16 inline-block">Phone :</span> [Clinic Phone Number]</p>
      <p><span class="text-white/40 w-16 inline-block">Email :</span> [Clinic Email Here]</p>
    </div>

    <!-- Bottom links -->
    <div class="pt-4 flex flex-wrap gap-x-8 gap-y-2 text-sm text-white/60">
      <a href="#" class="hover:text-white transition-colors">Contact</a>
      <a href="#" class="hover:text-white transition-colors">About us</a>
      <a href="#" class="hover:text-white transition-colors">Terms &amp; Conditions</a>
      <a href="#" class="hover:text-white transition-colors">Privacy Policy</a>
    </div>

    <p class="text-center text-xs text-white/40 mt-6">
      © {{ year }} CareNota. All rights reserved.
    </p>

  </div>
</footer>
