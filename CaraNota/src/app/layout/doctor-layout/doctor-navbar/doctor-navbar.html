<nav class="bg-white shadow-sm px-8 py-3 flex items-center justify-between rounded-2xl mx-4 mt-4">

  <!-- Logo -->
  <a routerLink="/doctor" class="flex items-center gap-2">
    <div class="w-10 h-10 bg-sky-light rounded-xl flex items-center justify-center">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z" fill="#2563eb" opacity="0.3"/>
        <path d="M12 4C9.2 4 7 6.2 7 9c0 3.8 5 10 5 10s5-6.2 5-10c0-2.8-2.2-5-5-5z" fill="#2563eb"/>
        <path d="M10 9h4M12 7v4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="text-xl font-bold">
      <span class="text-gray-700">Care</span><span class="text-carenota">Nota</span>
    </span>
  </a>

  <!-- Search -->
  <div class="flex items-center bg-gray-50 border border-gray-200 rounded-full px-4 py-2 w-72 gap-2">
    <svg class="w-4 h-4 text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"/>
    </svg>
    <input type="text" placeholder="Search Here..."
      class="bg-transparent outline-none text-sm text-gray-500 w-full" />
  </div>

  <!-- Healthcare Services Dropdown -->
  <div class="relative">
    <button (click)="toggleServices()"
      class="flex items-center gap-2 text-gray-700 font-medium text-sm hover:text-carenota transition-colors">
      Healthcare Services
      <svg class="w-4 h-4 transition-transform" [class.rotate-180]="servicesOpen"
        fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
      </svg>
    </button>
    @if (servicesOpen) {
      <div class="absolute top-10 left-0 bg-white rounded-xl shadow-lg border border-gray-100 py-2 w-48 z-50">
        @for (s of services; track s.label) {
          <a [routerLink]="s.route" (click)="servicesOpen = false"
            class="block px-4 py-2 text-sm text-gray-700 hover:bg-sky-card hover:text-carenota transition-colors">
            {{ s.label }}
          </a>
        }
      </div>
    }
  </div>

  <!-- Logout -->

</nav>
